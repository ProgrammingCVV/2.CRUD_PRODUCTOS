<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado La Economía</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    <h1>Supermercado La Economía</h1>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Ofertas</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<main>

<section>
    <h2>Productos</h2>
    <div class="productos"></div>
</section>

<section>
    <h2>Administrar Productos</h2>

    <form id="formProducto" enctype="multipart/form-data">
        <input type="hidden" id="productoId">

        <label for="productoNombre">Producto:</label>
        <input type="text" id="productoNombre" placeholder="Ej: Huevos">

        <label for="productoCategoria">Categoría:</label>
        <input type="text" id="productoCategoria" placeholder="Ej: Lácteos">

        <label for="productoPrecio">Precio:</label>
        <input type="number" id="productoPrecio" placeholder="Ej: 3500" step="0.01">

        <label for="productoCantidad">Cantidad:</label>
        <input type="number" id="productoCantidad" placeholder="Ej: 20">

        <label for="productoImagen">Imagen:</label>
        <input type="file" id="productoImagen" accept="image/*">

        <button type="submit" id="btnGuardarProducto">Guardar producto</button>
    </form>

    <p id="mensajeProducto"></p>
</section>

<section>
    <h2>Precios</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaProductos"></tbody>
    </table>
</section>

<section>
    <h2>Contacto</h2>

    <form id="formulario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre">

        <label for="correo">Correo:</label>
        <input type="email" id="correo">

        <button type="submit">Enviar</button>
    </form>

    <p id="mensaje"></p>
</section>

</main>

<footer>
    <p>© 2026 Supermercado</p>
</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script><!--ADICIÓN SENCILLA DE JQUERY *lineas 90, 131, 157, 182, 194.*-->
<script src="js/script.js"></script>

</body>
</html>
